<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel | Kasturi Restaurant</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f4f6f9;
}

header{
background:#111;
color:white;
padding:20px;
text-align:center;
font-size:22px;
}

.container{
max-width:1200px;
margin:30px auto;
padding:20px;
}

.order{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.order h3{
margin-bottom:10px;
}

.items{
background:#fafafa;
padding:10px;
border-radius:5px;
margin:10px 0;
}

.status{
font-weight:bold;
color:#ff5722;
}

select{
padding:8px;
border-radius:5px;
margin-top:10px;
}

button{
padding:8px 15px;
border:none;
background:#28a745;
color:white;
border-radius:5px;
cursor:pointer;
margin-left:10px;
}

button:hover{
background:#218838;
}

</style>

</head>

<body>

<header>
🍽️ Kasturi Restaurant Admin Panel
</header>

<div class="container">

<h2>Live Orders</h2>

<div id="orders"></div>

</div>

<script>

const API = "https://kasturi-restaurant-backend.onrender.com/api/admin/orders";

async function loadOrders(){

const res = await fetch(API);
const orders = await res.json();

const container = document.getElementById("orders");

container.innerHTML="";

if(orders.length === 0){
container.innerHTML = "<p>No orders yet</p>";
return;
}

orders.forEach(order => {

let itemsHTML="";

order.items.forEach(item=>{
itemsHTML += `<li>${item.name} - ₹${item.price}</li>`;
});

container.innerHTML += `

<div class="order">

<h3>Order ID: ${order.orderId}</h3>

<p><b>Customer:</b> ${order.customerName}</p>

<p><b>Phone:</b> ${order.phoneNumber}</p>

<p><b>Table / Address:</b> ${order.tableOrAddress}</p>

<div class="items">
<b>Items:</b>
<ul>
${itemsHTML}
</ul>
</div>

<p><b>Total:</b> ₹${order.totalAmount}</p>

<p class="status">Status: ${order.status}</p>

<select id="status-${order._id}">
<option value="Paid">Paid</option>
<option value="Preparing">Preparing</option>
<option value="Ready">Ready</option>
<option value="Delivered">Delivered</option>
</select>

<button onclick="updateStatus('${order._id}')">
Update Status
</button>

</div>

`;

});

}

async function updateStatus(id){

const status = document.getElementById("status-"+id).value;

await fetch(`https://kasturi-restaurant-backend.onrender.com/api/admin/orders/${id}`,{

method:"PUT",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify({status})

});

alert("Status Updated");

loadOrders();

}

loadOrders();

setInterval(loadOrders,5000);

</script>

</body>
</html>
