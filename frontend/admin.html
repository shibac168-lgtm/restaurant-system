<!DOCTYPE html>
<html>
<head>
<title>Admin Panel - Kasturi Restaurant</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:30px;
}

h1{
text-align:center;
}

.order{
background:white;
padding:20px;
margin:20px 0;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

button{
padding:8px 15px;
border:none;
margin:5px;
cursor:pointer;
border-radius:5px;
}

.accept{background:orange;color:white;}
.cooking{background:blue;color:white;}
.ready{background:green;color:white;}
.delivered{background:black;color:white;}

</style>
</head>

<body>

<h1>🍽 Kasturi Restaurant Admin</h1>

<div id="orders"></div>

<script>

const API = "https://kasturi-restaurant-backend.onrender.com/api/admin/orders";

async function loadOrders(){

const res = await fetch(API);
const orders = await res.json();

const container = document.getElementById("orders");

container.innerHTML="";

orders.forEach(order=>{

let itemsHTML="";

order.items.forEach(item=>{
itemsHTML += `<li>${item.name} - ₹${item.price}</li>`
})

const div = document.createElement("div");
div.className="order";

div.innerHTML = `

<h3>Order ID: ${order.orderId}</h3>

<p><b>Status:</b> ${order.status}</p>

<ul>
${itemsHTML}
</ul>

<p><b>Total:</b> ₹${order.totalAmount}</p>

<button class="accept" onclick="updateStatus('${order._id}','Accepted')">Accept</button>

<button class="cooking" onclick="updateStatus('${order._id}','Cooking')">Cooking</button>

<button class="ready" onclick="updateStatus('${order._id}','Ready')">Ready</button>

<button class="delivered" onclick="updateStatus('${order._id}','Delivered')">Delivered</button>

`;

container.appendChild(div)

})

}


async function updateStatus(id,status){

await fetch(`https://kasturi-restaurant-backend.onrender.com/api/admin/orders/${id}`,{

method:"PUT",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
status:status
})

})

loadOrders()

}

loadOrders()

setInterval(loadOrders,5000)

</script>

</body>
</html>
